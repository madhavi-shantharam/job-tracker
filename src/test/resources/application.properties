# Use H2 in-memory database for tests ? no PostgreSQL needed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Dummy API key for tests ? AnalysisService won't be called in unit tests
anthropic.api.key=test-key-not-used

# Disable devtools in tests
spring.devtools.restart.enabled=false

# Dummy S3 env vars for tests — S3Client is mocked, so these values are never used
S3_RESUME_BUCKET=test-bucket
AWS_REGION=us-east-1