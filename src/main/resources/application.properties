# Application
spring.application.name=job-tracker
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/jobtracker
spring.datasource.username=jobtracker
spring.datasource.password=jobtracker123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Note: do NOT set spring.jpa.database-platform in Spring Boot 4 + Hibernate 7
# It auto-detects from the JDBC URL ? setting it manually causes the dialect conflict
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# DevTools
spring.devtools.restart.enabled=true

# Anthropic API Key - loaded from .env
anthropic.api.key=${ANTHROPIC_API_KEY}

# For local development
spring.profiles.active=local