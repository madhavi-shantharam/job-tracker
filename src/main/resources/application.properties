# Application
spring.application.name=job-tracker
server.port=8080

# Database ? reads from env vars in production, falls back to local Docker values
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jobtracker}
spring.datasource.username=${DB_USERNAME:jobtracker}
spring.datasource.password=${DB_PASSWORD:jobtracker123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Note: do NOT set spring.jpa.database-platform in Spring Boot 4 + Hibernate 7
# It auto-detects from the JDBC URL ? setting it manually causes the dialect conflict
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# DevTools (Disable in production)
spring.devtools.restart.enabled=false

# Anthropic API Key - loaded from .env
anthropic.api.key=${ANTHROPIC_API_KEY}

# For local development
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Expose health endpoint for Docker/ECS health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never